<script type="text/javascript">
  RED.nodes.registerType('ai-agent', {
    category: 'MCP',
    color: '#42A5F5',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 'mcp-server-config', required: true },
      llmConfig: { value: '', type: 'llm-config', required: true },
      systemPrompt: { value: 'You are a helpful assistant. Use the available tools to answer the user\'s question. Be concise and factual.' },
      maxIterations: { value: 10 },
      temperature: { value: 0.3 },
      maxTokens: { value: 4096 },
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-cogs',
    paletteLabel: 'ai agent',
    label: function () {
      return this.name || 'ai agent';
    },
  });
</script>

<script type="text/html" data-template-name="ai-agent">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> MCP Server</label>
    <input type="text" id="node-input-server">
  </div>
  <div class="form-row">
    <label for="node-input-llmConfig"><i class="fa fa-magic"></i> LLM</label>
    <input type="text" id="node-input-llmConfig">
  </div>
  <div class="form-row">
    <label for="node-input-systemPrompt"><i class="fa fa-file-text-o"></i> System</label>
    <textarea id="node-input-systemPrompt" rows="5" style="width:70%" placeholder="System prompt for the agent..."></textarea>
  </div>
  <div class="form-row">
    <label for="node-input-maxIterations"><i class="fa fa-repeat"></i> Max Loops</label>
    <input type="number" id="node-input-maxIterations" min="1" max="50" style="width:80px">
  </div>
  <div class="form-row">
    <label for="node-input-temperature"><i class="fa fa-thermometer-half"></i> Temp</label>
    <input type="number" id="node-input-temperature" min="0" max="2" step="0.1" style="width:80px">
  </div>
  <div class="form-row">
    <label for="node-input-maxTokens"><i class="fa fa-text-width"></i> Max Tokens</label>
    <input type="number" id="node-input-maxTokens" min="1" max="128000" style="width:120px">
  </div>
</script>

<script type="text/html" data-help-name="ai-agent">
  <p>Autonomous AI agent that uses MCP tools to answer questions.</p>
  <p>Connects an LLM to MCP tools in an agentic loop: the LLM decides which tools to call,
  executes them, and reasons about the results until it has a final answer.</p>

  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string</span></dt>
    <dd>The user question or task for the agent.</dd>
  </dl>

  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string</span></dt>
    <dd>The agent's final response.</dd>
    <dt>agentLog <span class="property-type">array</span></dt>
    <dd>Log of all tool calls made (tool name, args, result).</dd>
    <dt>iterations <span class="property-type">number</span></dt>
    <dd>Number of LLM calls made.</dd>
  </dl>

  <h3>Details</h3>
  <p>The agent loop works like this:</p>
  <ol>
    <li>Send user message + available MCP tools to the LLM</li>
    <li>If the LLM requests tool calls → execute them via MCP</li>
    <li>Feed tool results back to the LLM → repeat</li>
    <li>When the LLM responds with text (no tool calls) → output</li>
  </ol>
  <p>Works with any OpenAI-compatible API and any MCP server.</p>

  <h3>Example: Manufacturing AI</h3>
  <p>Connect to an OEE MCP server and ask: <em>"What is the current OEE of machine CNC-001?"</em></p>
  <p>The agent will automatically discover and call the right MCP tools to answer.</p>
</script>

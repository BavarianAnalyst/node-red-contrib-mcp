<script type="text/javascript">
  RED.nodes.registerType('mcp-resource-read', {
    category: 'MCP',
    color: '#7E57C2',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 'mcp-server-config', required: true },
      uri: { value: '' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-database',
    paletteLabel: 'mcp resource',
    label: function () {
      return this.name || this.uri || 'mcp resource';
    },
  });
</script>

<script type="text/html" data-template-name="mcp-resource-read">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
    <input type="text" id="node-input-server">
  </div>
  <div class="form-row">
    <label for="node-input-uri"><i class="fa fa-link"></i> Resource URI</label>
    <input type="text" id="node-input-uri" placeholder="file:///data.json (or use msg.topic)">
  </div>
</script>

<script type="text/html" data-help-name="mcp-resource-read">
  <p>Reads a resource from an MCP server.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt class="optional">topic <span class="property-type">string</span></dt>
    <dd>Resource URI (if not set in node config).</dd>
  </dl>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string | object</span></dt>
    <dd>Resource content (parsed JSON if possible).</dd>
    <dt>mcpResult <span class="property-type">object</span></dt>
    <dd>Raw MCP response.</dd>
  </dl>
</script>

<script type="text/javascript">
  RED.nodes.registerType('mcp-tool-list', {
    category: 'MCP',
    color: '#7E57C2',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 'mcp-server-config', required: true },
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-list',
    paletteLabel: 'mcp tools',
    label: function () {
      return this.name || 'mcp tools';
    },
  });
</script>

<script type="text/html" data-template-name="mcp-tool-list">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
    <input type="text" id="node-input-server">
  </div>
</script>

<script type="text/html" data-help-name="mcp-tool-list">
  <p>Lists all available tools from an MCP server.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">any</span></dt>
    <dd>Trigger (any message starts the listing).</dd>
  </dl>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">array</span></dt>
    <dd>Array of tool definitions with name, description, and inputSchema.</dd>
    <dt>toolCount <span class="property-type">number</span></dt>
    <dd>Number of tools found.</dd>
  </dl>
</script>

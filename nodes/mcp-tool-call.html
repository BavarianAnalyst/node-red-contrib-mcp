<script type="text/javascript">
  RED.nodes.registerType('mcp-tool-call', {
    category: 'MCP',
    color: '#7E57C2',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 'mcp-server-config', required: true },
      toolName: { value: '' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-wrench',
    paletteLabel: 'mcp tool',
    label: function () {
      return this.name || this.toolName || 'mcp tool';
    },
  });
</script>

<script type="text/html" data-template-name="mcp-tool-call">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
    <input type="text" id="node-input-server">
  </div>
  <div class="form-row">
    <label for="node-input-toolName"><i class="fa fa-wrench"></i> Tool</label>
    <input type="text" id="node-input-toolName" placeholder="tool_name (or leave empty to use msg.topic)">
  </div>
</script>

<script type="text/html" data-help-name="mcp-tool-call">
  <p>Calls a tool on an MCP server.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>Tool arguments as key-value pairs.</dd>
    <dt class="optional">topic <span class="property-type">string</span></dt>
    <dd>Tool name (if not set in node config).</dd>
  </dl>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string | object</span></dt>
    <dd>The tool result (parsed JSON if possible).</dd>
    <dt>mcpResult <span class="property-type">object</span></dt>
    <dd>Raw MCP response.</dd>
  </dl>
  <h3>Details</h3>
  <p>Configure the MCP server connection and tool name. Pass arguments via <code>msg.payload</code> as an object.</p>
  <p>The tool name can be set in the node config or dynamically via <code>msg.topic</code>.</p>
</script>
